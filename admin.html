<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Winner Chapel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#8B0000;--red-bright:#B22222;--black:#0a0a0a;--black-mid:#111111;--black-soft:#1a1a1a;--gold:#c9a84c;--white:#f5f0eb;--white-dim:rgba(245,240,235,.70)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh}

    /* ── LOGIN ── */
    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,rgba(139,0,0,.2) 0%,transparent 65%)}
    .login-box{background:var(--black-soft);border:1px solid rgba(139,0,0,.3);padding:3rem 2.5rem;width:100%;max-width:380px;position:relative}
    .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
    .login-box h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:.4rem} .login-box h2 span{color:var(--red-bright)}
    .login-box p{font-size:.78rem;color:var(--white-dim);margin-bottom:2rem}
    .error-msg{color:#fca5a5;font-size:.78rem;margin-top:.8rem;text-align:center}

    /* ── FORMS ── */
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.63rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(139,0,0,.3);color:var(--white);padding:.68rem .95rem;font-family:'Inter',sans-serif;font-size:.83rem;outline:none;transition:border-color .25s;appearance:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--red-bright)}
    .form-group select option{background:var(--black-soft)} .form-group textarea{resize:vertical;min-height:85px}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
    .optional-badge{font-size:.55rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(201,168,76,.5);margin-left:.4rem;vertical-align:middle}
    .form-section-title{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.55);margin:1.2rem 0 .7rem;padding-bottom:.4rem;border-bottom:1px solid rgba(139,0,0,.25)}
    .date-range-hint{font-size:.72rem;color:var(--gold);margin-top:.5rem;padding:.45rem .8rem;background:rgba(201,168,76,.08);border-left:2px solid rgba(201,168,76,.4);display:none;font-style:italic}
    .date-range-hint.visible{display:block}

    /* ── BUTTONS ── */
    .btn{padding:.78rem 1.4rem;font-family:'Inter',sans-serif;font-size:.73rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:none;transition:all .25s}
    .btn-red{background:var(--red);color:var(--white)} .btn-red:hover{background:var(--red-bright)}
    .btn-full{width:100%;display:block;margin-top:.5rem}
    .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--white-dim)} .btn-ghost:hover{border-color:rgba(255,255,255,.3);color:var(--white)}
    .btn-danger{background:transparent;border:1px solid #7f1d1d;color:#fca5a5;font-size:.68rem;padding:.28rem .68rem;letter-spacing:.08em} .btn-danger:hover{background:#7f1d1d;color:var(--white)}
    .btn-edit{background:transparent;border:1px solid rgba(201,168,76,.35);color:var(--gold);font-size:.68rem;padding:.28rem .68rem;letter-spacing:.08em} .btn-edit:hover{background:rgba(201,168,76,.12)}

    /* ── ADMIN SHELL ── */
    .admin-screen{display:none;min-height:100vh;flex-direction:column}
    header{background:var(--black-mid);border-bottom:1px solid rgba(139,0,0,.4);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .header-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700} .header-logo span{color:var(--red-bright)}
    .header-sub{font-size:.7rem;color:var(--white-dim);font-family:'Inter',sans-serif;font-weight:400;margin-left:.6rem}
    .header-right{display:flex;align-items:center;gap:1.2rem}
    .admin-badge{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);padding:.22rem .65rem}
    .btn-logout{background:transparent;border:1px solid rgba(139,0,0,.4);color:var(--white-dim);font-family:'Inter',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.32rem .85rem;cursor:pointer;transition:all .2s} .btn-logout:hover{border-color:var(--red);color:var(--white)}

    /* ── TABS ── */
    .tabs{display:flex;border-bottom:1px solid rgba(139,0,0,.25);padding:0 2rem;background:var(--black-mid)}
    .tab{padding:.9rem 1.4rem;font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;color:var(--white-dim);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .22s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
    .tab:hover{color:var(--white)} .tab.active{color:var(--red-bright);border-bottom-color:var(--red-bright)}
    .tab-badge{background:var(--red);color:var(--white);font-size:.56rem;border-radius:8px;padding:.08rem .42rem;margin-left:.4rem;vertical-align:middle;font-weight:700}
    .tab-panel{display:none;padding:2.5rem 2rem;max-width:1200px;margin:0 auto;width:100%}
    .tab-panel.active{display:block}

    /* ── EVENTS TAB ── */
    .events-layout{display:grid;grid-template-columns:420px 1fr;gap:2.5rem;align-items:start}
    .panel{background:var(--black-soft);border:1px solid rgba(139,0,0,.22);padding:2rem;position:relative;overflow:hidden}
    .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
    .panel h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:1.5rem} .panel h3 span{color:var(--red-bright)}

    .stats-row{display:flex;gap:1rem;margin-bottom:2rem}
    .stat{background:var(--black-soft);border:1px solid rgba(139,0,0,.2);padding:.95rem 1rem;flex:1;text-align:center}
    .stat .num{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--red-bright)}
    .stat .lbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--white-dim);margin-top:.18rem}

    .event-row{background:var(--black-soft);border:1px solid rgba(139,0,0,.15);padding:1rem 1.2rem;margin-bottom:.7rem;display:grid;grid-template-columns:auto 1fr auto;gap:1rem;align-items:start;transition:border-color .22s}
    .event-row:hover{border-color:rgba(139,0,0,.4)}
    .ev-date-blk{background:var(--red);padding:.5rem .7rem;text-align:center;min-width:70px}
    .ev-date-blk .m{font-size:.55rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
    .ev-date-blk .d{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1}
    .ev-date-blk .y{font-size:.55rem;opacity:.7}
    .ev-date-blk .end-arrow{font-size:.58rem;opacity:.75;margin-top:.25rem;letter-spacing:.04em;border-top:1px solid rgba(255,255,255,.2);padding-top:.2rem}
    .ev-info .etitle{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;margin-bottom:.25rem}
    .ev-info .emeta{font-size:.7rem;color:var(--white-dim);line-height:1.6}
    .ev-tag{display:inline-block;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.3);padding:.07rem .42rem;margin-right:.35rem}
    .ev-duration{font-size:.64rem;color:rgba(201,168,76,.65);font-style:italic;margin-top:.25rem}
    .ev-actions{display:flex;flex-direction:column;gap:.32rem}

    /* ── REGISTRATIONS ── */
    .reg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:1rem}
    .reg-header h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700} .reg-header h3 span{color:var(--red-bright)}
    .reg-filter{display:flex;gap:.45rem}
    .reg-filter-btn{background:var(--black-soft);border:1px solid rgba(139,0,0,.22);color:var(--white-dim);padding:.35rem .9rem;font-family:'Inter',sans-serif;font-size:.67rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .22s}
    .reg-filter-btn:hover,.reg-filter-btn.active{background:var(--red);border-color:var(--red);color:var(--white)}
    .reg-stats{display:flex;gap:1rem;margin-bottom:1.8rem}
    .reg-card{background:var(--black-soft);border:1px solid rgba(139,0,0,.15);padding:1.2rem 1.4rem;margin-bottom:.75rem;display:grid;grid-template-columns:auto 1fr auto;gap:1.1rem;align-items:start;transition:border-color .22s;position:relative}
    .reg-card:hover{border-color:rgba(139,0,0,.35)}
    .reg-card.unseen{border-left:3px solid var(--red-bright)}
    .new-badge{position:absolute;top:.6rem;right:.8rem;font-size:.54rem;font-weight:700;letter-spacing:.14em;color:var(--white);background:var(--red);padding:.1rem .42rem}
    .reg-avatar{width:40px;height:40px;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;flex-shrink:0;margin-top:2px}
    .reg-name{font-family:'Playfair Display',serif;font-size:.92rem;font-weight:600;margin-bottom:.28rem}
    .reg-email{font-size:.76rem;color:var(--white-dim);margin-bottom:.38rem}
    .reg-pills{display:flex;flex-wrap:wrap;gap:.35rem}
    .reg-pill{font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;padding:.13rem .52rem;border:1px solid rgba(255,255,255,.1);color:var(--white-dim)}
    .reg-pill.event-pill{border-color:rgba(201,168,76,.3);color:var(--gold)}
    .reg-message{margin-top:.55rem;font-size:.76rem;color:var(--white-dim);font-style:italic;padding-left:.65rem;border-left:2px solid rgba(139,0,0,.4)}
    .reg-actions{display:flex;flex-direction:column;gap:.32rem;align-items:flex-end}
    .btn-mark{background:transparent;border:1px solid rgba(64,145,108,.4);color:#6ee7b7;font-size:.62rem;padding:.28rem .65rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;white-space:nowrap;transition:all .22s} .btn-mark:hover{background:rgba(64,145,108,.15)}

    .empty{text-align:center;padding:3rem;color:var(--white-dim);font-size:.85rem}
    .loading{text-align:center;padding:2.5rem;color:var(--white-dim);font-size:.85rem}
    .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--red);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--black-soft);border:1px solid rgba(139,0,0,.5);padding:1rem 1.5rem;font-size:.82rem;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)} .toast.success{border-color:rgba(64,145,108,.6);color:#6ee7b7} .toast.error{border-color:rgba(139,0,0,.8);color:#fca5a5}

    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:900px){.events-layout{grid-template-columns:1fr}.tabs{padding:0 1rem}.tab{padding:.8rem 1rem}.form-row-2{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Winner <span>Chapel</span></h2>
    <p>Admin Panel — Enter your password to continue</p>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn btn-red btn-full" onclick="login()">Login</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <header>
    <div>
      <span class="header-logo">Winner <span>Chapel</span></span>
      <span class="header-sub">/ Admin Panel</span>
    </div>
    <div class="header-right">
      <span class="admin-badge">Administrator</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('events',this)">Events</button>
    <button class="tab" id="regTab" onclick="switchTab('registrations',this)">
      Registrations <span class="tab-badge" id="unseenBadge" style="display:none">0</span>
    </button>
  </div>

  <!-- TAB: EVENTS -->
  <div class="tab-panel active" id="tab-events">
    <div class="events-layout">

      <!-- FORM -->
      <div class="panel" id="formPanel">
        <h3 id="formTitle">Add New <span>Event</span></h3>
        <input type="hidden" id="editId"/>

        <div class="form-group">
          <label>Event Title</label>
          <input type="text" id="fTitle" placeholder="e.g. Sunday Revival Service"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="fCategory">
            <option value="worship">Worship</option>
            <option value="prayer">Prayer</option>
            <option value="fellowship">Fellowship</option>
            <option value="outreach">Outreach</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="fLocation" value="Winner Chapel Main Hall"/>
        </div>

        <!-- START -->
        <div class="form-section-title">Start Date & Time</div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="fDateStart" onchange="updateHint()"/>
          </div>
          <div class="form-group">
            <label>Start Time</label>
            <input type="text" id="fTimeStart" placeholder="9:00 AM" onchange="updateHint()"/>
          </div>
        </div>

        <!-- END -->
        <div class="form-section-title">End Date & Time <span class="optional-badge">optional</span></div>
        <div class="form-row-2">
          <div class="form-group">
            <label>End Date <span class="optional-badge">if multi-day</span></label>
            <input type="date" id="fDateEnd" onchange="updateHint()"/>
          </div>
          <div class="form-group">
            <label>End Time <span class="optional-badge">optional</span></label>
            <input type="text" id="fTimeEnd" placeholder="5:00 PM" onchange="updateHint()"/>
          </div>
        </div>

        <!-- Live preview -->
        <div class="date-range-hint" id="dateHint"></div>

        <div class="form-group" style="margin-top:.9rem">
          <label>Description</label>
          <textarea id="fDesc" placeholder="Short description of the event..."></textarea>
        </div>

        <button class="btn btn-red btn-full" onclick="saveEvent()">Save Event</button>
        <button class="btn btn-ghost btn-full" id="cancelBtn" onclick="cancelEdit()" style="display:none;margin-top:.5rem">Cancel Edit</button>
      </div>

      <!-- LIST -->
      <div>
        <div class="stats-row">
          <div class="stat"><div class="num" id="statTotal">—</div><div class="lbl">Total</div></div>
          <div class="stat"><div class="num" id="statUpcoming">—</div><div class="lbl">Upcoming</div></div>
          <div class="stat"><div class="num" id="statPast">—</div><div class="lbl">Past</div></div>
        </div>
        <div id="adminEventsList"><div class="loading">Loading <span class="spinner"></span></div></div>
      </div>
    </div>
  </div>

  <!-- TAB: REGISTRATIONS -->
  <div class="tab-panel" id="tab-registrations">
    <div class="reg-header">
      <h3>All <span>Registrations</span></h3>
      <div class="reg-filter">
        <button class="reg-filter-btn active" onclick="filterRegs(this,'all')">All</button>
        <button class="reg-filter-btn" onclick="filterRegs(this,'unseen')">New</button>
      </div>
    </div>
    <div class="reg-stats" id="regStats"></div>
    <div id="regList"><div class="loading">Loading <span class="spinner"></span></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  const SUPABASE_URL      = 'https://ydgcaquqnetawssqlnkj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZ2NhcXVxbmV0YXdzc3FsbmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzEwMjgsImV4cCI6MjA5MTcwNzAyOH0.Ep15_AoOK-Rcgk4LyoZBJq5cQVr7Hx4k-RcS_EKWDAM';
  const ADMIN_PASSWORD    = 'winnerschapel2025';

  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const MONTHS      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let allEvents = [], allRegs = [], regFilter = 'all';

  // ── AUTH ──
  window.login = () => {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'flex';
      loadEvents(); loadRegistrations();
      setInterval(loadRegistrations, 30000);
    } else { document.getElementById('loginError').textContent = 'Incorrect password.'; }
  };
  window.logout = () => {
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').textContent = '';
  };
  window.switchTab = (name, btn) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  };

  // ── LIVE DATE HINT ──
  window.updateHint = () => {
    const ds = document.getElementById('fDateStart').value;
    const de = document.getElementById('fDateEnd').value;
    const ts = document.getElementById('fTimeStart').value;
    const te = document.getElementById('fTimeEnd').value;
    const hint = document.getElementById('dateHint');
    if (!ds) { hint.classList.remove('visible'); return; }

    const dStart = new Date(ds + 'T00:00:00');
    let text = `${MONTHS_FULL[dStart.getMonth()]} ${dStart.getDate()}, ${dStart.getFullYear()}`;
    if (ts) text += ` at ${ts}`;

    if (de && de !== ds) {
      const dEnd = new Date(de + 'T00:00:00');
      const diff = Math.round((dEnd - dStart) / (1000*60*60*24));
      text += `  →  ${MONTHS_FULL[dEnd.getMonth()]} ${dEnd.getDate()}, ${dEnd.getFullYear()}`;
      if (te) text += ` at ${te}`;
      text += `  (${diff} day${diff !== 1 ? 's' : ''})`;
    } else if (te) {
      text += `  →  ${te}`;
    }

    hint.textContent = text;
    hint.classList.add('visible');
  };

  // ── LOAD EVENTS ──
  async function loadEvents() {
    const { data, error } = await supabase.from('events').select('*').order('date', { ascending: true });
    if (error) { showToast('Failed to load events', 'error'); return; }
    allEvents = data;
    renderAdminEvents(data);
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('statTotal').textContent    = data.length;
    document.getElementById('statUpcoming').textContent = data.filter(e => e.date >= today).length;
    document.getElementById('statPast').textContent     = data.filter(e => e.date < today).length;
  }

  function renderAdminEvents(events) {
    const list  = document.getElementById('adminEventsList');
    const today = new Date().toISOString().split('T')[0];
    if (!events.length) { list.innerHTML = '<div class="empty">No events yet.</div>'; return; }

    list.innerHTML = events.map(ev => {
      const d    = new Date(ev.date + 'T00:00:00');
      const past = ev.date < today;

      // End date badge inside the date block
      let endLabel = '';
      if (ev.date_end && ev.date_end !== ev.date) {
        const dEnd = new Date(ev.date_end + 'T00:00:00');
        endLabel = `to ${MONTHS[dEnd.getMonth()]} ${String(dEnd.getDate()).padStart(2,'0')}`;
      }

      // Duration text below meta
      let durationText = '';
      if (ev.date_end && ev.date_end !== ev.date) {
        const diff = Math.round((new Date(ev.date_end) - new Date(ev.date)) / (1000*60*60*24));
        durationText = `Multi-day — ${diff} day${diff !== 1 ? 's' : ''}`;
      }

      // Time range
      let timeDisplay = ev.time || '';
      if (ev.time_end) timeDisplay += ` — ${ev.time_end}`;

      return `
        <div class="event-row" style="${past ? 'opacity:.42' : ''}">
          <div class="ev-date-blk">
            <div class="m">${MONTHS[d.getMonth()]}</div>
            <div class="d">${String(d.getDate()).padStart(2,'0')}</div>
            <div class="y">${d.getFullYear()}</div>
            ${endLabel ? `<div class="end-arrow">${endLabel}</div>` : ''}
          </div>
          <div class="ev-info">
            <div class="etitle">
              ${ev.title}
              ${past ? ' <span style="font-size:.58rem;color:#fca5a5">(past)</span>' : ''}
            </div>
            <div class="emeta">
              <span class="ev-tag">${ev.category}</span>
              ${timeDisplay} &nbsp;|&nbsp; ${ev.location}
            </div>
            ${durationText ? `<div class="ev-duration">${durationText}</div>` : ''}
          </div>
          <div class="ev-actions">
            <button class="btn btn-edit" onclick="window.editEvent('${ev.id}')">Edit</button>
            <button class="btn btn-danger" onclick="window.deleteEvent('${ev.id}','${ev.title.replace(/'/g,"\\'")}')">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── SAVE ──
  window.saveEvent = async () => {
    const id          = document.getElementById('editId').value;
    const title       = document.getElementById('fTitle').value.trim();
    const date        = document.getElementById('fDateStart').value;
    const time        = document.getElementById('fTimeStart').value.trim();
    const date_end    = document.getElementById('fDateEnd').value   || null;
    const time_end    = document.getElementById('fTimeEnd').value.trim() || null;
    const category    = document.getElementById('fCategory').value;
    const location    = document.getElementById('fLocation').value.trim();
    const description = document.getElementById('fDesc').value.trim();

    if (!title) { showToast('Event title is required.', 'error'); return; }
    if (!date)  { showToast('Start date is required.', 'error'); return; }
    if (!time)  { showToast('Start time is required.', 'error'); return; }
    if (date_end && date_end < date) { showToast('End date cannot be before start date.', 'error'); return; }

    const payload = { title, date, time, date_end, time_end, category, location, description };
    const { error } = id
      ? await supabase.from('events').update(payload).eq('id', id)
      : await supabase.from('events').insert([payload]);

    if (error) { showToast('Save failed: ' + error.message, 'error'); return; }
    showToast(id ? 'Event updated!' : 'Event added!', 'success');
    cancelEdit(); loadEvents();
  };

  // ── EDIT ──
  window.editEvent = (id) => {
    const ev = allEvents.find(e => e.id === id);
    if (!ev) return;
    document.getElementById('editId').value     = ev.id;
    document.getElementById('fTitle').value     = ev.title;
    document.getElementById('fDateStart').value = ev.date;
    document.getElementById('fTimeStart').value = ev.time || '';
    document.getElementById('fDateEnd').value   = ev.date_end || '';
    document.getElementById('fTimeEnd').value   = ev.time_end || '';
    document.getElementById('fCategory').value  = ev.category;
    document.getElementById('fLocation').value  = ev.location;
    document.getElementById('fDesc').value      = ev.description || '';
    document.getElementById('formTitle').innerHTML = 'Edit <span>Event</span>';
    document.getElementById('cancelBtn').style.display = 'block';
    document.getElementById('formPanel').scrollIntoView({ behavior: 'smooth' });
    updateHint();
  };

  window.cancelEdit = () => {
    ['editId','fTitle','fDateStart','fTimeStart','fDateEnd','fTimeEnd','fDesc']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('fLocation').value = 'Winner Chapel Main Hall';
    document.getElementById('fCategory').value = 'worship';
    document.getElementById('formTitle').innerHTML = 'Add New <span>Event</span>';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('dateHint').classList.remove('visible');
  };

  window.deleteEvent = async (id, title) => {
    if (!confirm(`Delete "${title}"?`)) return;
    const { error } = await supabase.from('events').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    showToast('Event deleted.', 'success'); loadEvents();
  };

  // ── REGISTRATIONS ──
  async function loadRegistrations() {
    const { data, error } = await supabase.from('registrations').select('*').order('registered_at', { ascending: false });
    if (error) return;
    allRegs = data;
    const unseen = data.filter(r => !r.seen).length;
    const badge  = document.getElementById('unseenBadge');
    unseen > 0 ? (badge.textContent = unseen, badge.style.display = 'inline') : badge.style.display = 'none';
    renderRegistrations();
  }

  function renderRegistrations() {
    const filtered = regFilter === 'unseen' ? allRegs.filter(r => !r.seen) : allRegs;
    const total    = allRegs.length;
    const newCount = allRegs.filter(r => !r.seen).length;
    const evCount  = [...new Set(allRegs.map(r => r.event_title))].length;

    document.getElementById('regStats').innerHTML = `
      <div class="stat"><div class="num">${total}</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="num" style="color:#fca5a5">${newCount}</div><div class="lbl">New</div></div>
      <div class="stat"><div class="num">${evCount}</div><div class="lbl">Events</div></div>`;

    const list = document.getElementById('regList');
    if (!filtered.length) { list.innerHTML = '<div class="empty">No registrations yet.</div>'; return; }

    list.innerHTML = filtered.map(r => {
      const dt      = new Date(r.registered_at);
      const dateStr = `${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()} @ ${dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
      const initials = r.full_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      return `
        <div class="reg-card ${r.seen ? '' : 'unseen'}" id="reg-${r.id}">
          ${!r.seen ? '<span class="new-badge">NEW</span>' : ''}
          <div class="reg-avatar">${initials}</div>
          <div>
            <div class="reg-name">${r.full_name}</div>
            <div class="reg-email">${r.email}${r.phone ? ` &nbsp;|&nbsp; ${r.phone}` : ''}</div>
            <div class="reg-pills">
              <span class="reg-pill event-pill">${r.event_title}</span>
              <span class="reg-pill">${r.attendees} person${parseInt(r.attendees) > 1 ? 's' : ''}</span>
              <span class="reg-pill">${dateStr}</span>
            </div>
            ${r.message ? `<div class="reg-message">"${r.message}"</div>` : ''}
          </div>
          <div class="reg-actions">
            ${!r.seen
              ? `<button class="btn-mark" onclick="window.markSeen('${r.id}')">Mark Seen</button>`
              : '<span style="font-size:.63rem;color:var(--white-dim)">SEEN</span>'}
            <button class="btn btn-danger" onclick="window.deleteReg('${r.id}')">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  window.filterRegs = (btn, filter) => {
    document.querySelectorAll('.reg-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); regFilter = filter; renderRegistrations();
  };

  window.markSeen = async (id) => {
    const { error } = await supabase.from('registrations').update({ seen: true }).eq('id', id);
    if (error) { showToast('Failed to update', 'error'); return; }
    allRegs = allRegs.map(r => r.id === id ? { ...r, seen: true } : r);
    renderRegistrations();
    const unseen = allRegs.filter(r => !r.seen).length;
    const badge  = document.getElementById('unseenBadge');
    unseen > 0 ? (badge.textContent = unseen, badge.style.display = 'inline') : badge.style.display = 'none';
  };

  window.deleteReg = async (id) => {
    if (!confirm('Delete this registration?')) return;
    const { error } = await supabase.from('registrations').delete().eq('id', id);
    if (error) { showToast('Delete failed', 'error'); return; }
    allRegs = allRegs.filter(r => r.id !== id);
    renderRegistrations(); showToast('Registration deleted.', 'success');
  };

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
